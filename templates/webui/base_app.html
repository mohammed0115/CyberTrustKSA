{% load static %}
<!doctype html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} • App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: "#0B1220",
            base: "#0A0F1C",
            card: "#111827",
            teal: "#0F766E",
            glow: "#22C55E",
            info: "#38BDF8",
            warn: "#F59E0B",
            danger: "#EF4444",
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{% static 'webui/css/app.css' %}">
</head>
<body class="min-h-screen bg-[#0a0f1e] text-white">
  <div class="absolute inset-0 opacity-15 cyber-grid pointer-events-none"></div>

  <div class="relative z-10 flex min-h-screen">
    {% include "webui/includes/sidebar.html" %}
    <div class="flex-1">
      {% include "webui/includes/topbar.html" %}

      {% if messages %}
        <div class="mx-auto max-w-6xl px-4 pt-4 space-y-2">
          {% for message in messages %}
            <div class="rounded-xl border border-white/10 bg-card/70 px-4 py-3 text-sm">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <main class="mx-auto max-w-6xl px-4 py-6">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="{% static 'webui/js/app.js' %}"></script>
</body>
</html>
