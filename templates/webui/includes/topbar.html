<div class="border-b border-white/5 bg-[#0a0f1e]/60 backdrop-blur">
  <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
    <div>
      <div class="text-sm text-white/60">{% if is_ar %}مرحباً{% else %}Welcome{% endif %}</div>
      <div class="font-semibold">
        {% if request.user.is_authenticated %}
          {{ request.user.email }}
        {% else %}
          —
        {% endif %}
      </div>
    </div>

    <div class="flex items-center gap-3">
      <a class="text-sm text-white/70 hover:text-white" href="?lang={% if is_ar %}en{% else %}ar{% endif %}">
        {% if is_ar %}English{% else %}العربية{% endif %}
      </a>

      <a href="{% url 'webui:org_setup' %}" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-card/40 hover:bg-card/70 text-sm {% if is_ar %}flex-row-reverse{% endif %}">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
          <path d="M3 12h2m14 0h2M12 3v2m0 14v2M5.6 5.6l1.4 1.4m10-1.4-1.4 1.4M5.6 18.4l1.4-1.4m10 1.4-1.4-1.4"/>
        </svg>
        <span>{% if is_ar %}إعداد المنظمة{% else %}Org Setup{% endif %}</span>
      </a>

      <div class="h-10 w-10 rounded-2xl bg-white/5 border border-white/10 grid place-items-center">
        <span class="text-sm font-semibold">{{ request.user.email|slice:":1"|upper }}</span>
      </div>
    </div>
  </div>
</div>
