"""
Pytest configuration file - automatic test discovery and plugins
"""
import os
import django
from pathlib import Path

# Configure Django before pytest runs
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'cybertrust.config.settings.test')
django.setup()

# Pytest configuration
pytest_plugins = []

# Test discovery patterns
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Markers for organizing tests
def pytest_configure(config):
    config.addinivalue_line("markers", "slow: marks tests as slow (deselect with '-m \"not slow\"')")
    config.addinivalue_line("markers", "integration: marks tests as integration tests")
    config.addinivalue_line("markers", "unit: marks tests as unit tests")
    config.addinivalue_line("markers", "api: marks tests as API tests")
    config.addinivalue_line("markers", "services: marks tests as service tests")
    config.addinivalue_line("markers", "models: marks tests as model tests")

